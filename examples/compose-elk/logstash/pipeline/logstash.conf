input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [time] {
    date {
      match => ["time", "ISO8601"]
      target => "@timestamp"
    }
  }

  mutate {
    add_field => {
      "ingest_pipeline" => "pipeleek-compose"
      "[event][module]" => "pipeleek"
      "[event][dataset]" => "pipeleek.scan"
    }
    copy => {
      "scan_job" => "[scan][platform]"
      "source" => "[scan][source]"
      "level" => "[scan][level]"
      "message" => "[scan][message]"
      "confidence" => "[scan][confidence]"
      "ruleName" => "[secret][rule_name]"
      "job" => "[scan][job_name]"
      "url" => "[scan][target_url]"
      "type" => "[scan][asset_type]"
    }
  }

  if [scan][confidence] {
    mutate {
      lowercase => ["[scan][confidence]"]
    }
  }

  ruby {
    code => '
      level = (event.get("level") || "").to_s.downcase
      is_hit = level == "hit"

      event.set("[scan][is_hit]", is_hit)
      event.set("[secret][is_present]", is_hit)

      if is_hit
        event.set("[event][kind]", "alert")
        event.set("[event][category]", "threat")
        event.set("[event][type]", "indicator")
        event.set("[event][outcome]", "success")
      else
        event.set("[event][kind]", "event")
        event.set("[event][category]", "process")
        event.set("[event][type]", "info")
        event.set("[event][outcome]", "success")
      end
    '
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "pipeleek-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
