name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable
          cache: true

      - name: Run unit tests (Linux)
        if: runner.os == 'Linux'
        run: make test-unit

      - name: Generate coverage report (Linux)
        if: runner.os == 'Linux'
        run: go test $(go list ./... | grep -v /tests/e2e) -coverprofile=coverage.out -covermode=atomic

      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        run: make test-unit
        shell: bash

      - name: Upload coverage artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-linux
          path: ./coverage.out

  e2e-tests:
    name: E2E Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable
          cache: true

      - name: Build pipeleek binary for e2e tests (Windows)
        if: runner.os == 'Windows'
        env:
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o pipeleek.exe ./cmd/pipeleek

      - name: Run e2e tests (Linux)
        if: runner.os == 'Linux'
        run: make test-e2e

      - name: Run e2e tests (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PIPELEEK_BINARY = "$(Get-Location)\pipeleek.exe"
          go test ./tests/e2e/... -tags=e2e -v -timeout 10m
        shell: pwsh
