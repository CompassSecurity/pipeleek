name: gosec
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable
      - name: Run Gosec Security Scanner
        uses: securego/gosec@bb17e422fc34bf4c0a2e5cab9d07dc45a68c040c # v2.24.7
        with:
          args: "-no-fail -fmt json -out results.json ./..."

      - name: Check Gosec Results
        run: |
          FOUND=$(jq '.Stats.found // 0' results.json)
          echo "Gosec found $FOUND issue(s)"
          if [ "$FOUND" -gt 0 ]; then
            echo "❌ Security issues detected! Please fix them before merging."
            exit 1
          else
            echo "✅ No security issues found."
          fi

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          inputs: .
          fail_on_error: true
